<html lang="de">
<head>
<meta charset="UTF-8">
<title>HTML in Fenster einbetten</title>
<style>
    body {
        font-family: Arial, sans-serif;
    }
    .frame-container {
        width: 600px;
        height: 400px;
        border: 2px solid #333;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        overflow: hidden;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

<h2>HTML-Code in einem Fenster (iframe)</h2>

<div class="frame-container">
    <!-- Hier kann eine externe oder interne HTML-Datei geladen werden -->
    <iframe srcdoc="
        <h1 style='color:darkblue;'>Hallo Welt!</h1>
        <p>Dies ist eingebetteter HTML-Code im Fenster.</p>
        <ul>
            <li>Listenpunkt 1</li>
            <li>Listenpunkt 2</li>
        </ul>
    "></iframe>
</div>

</body>
</html>
